  <script>
function newPage(page) {
  const pageMap = {
    home: 'home.html',
    contact: 'contact.html',
    about: 'about.html',
    game: './game/game.html',
    vault: 'vault.html',
    media: 'media.html',
    lost: 'lost.html',
    chug: 'chug.html',
    terms: 'terms.html',
    // add more mappings as needed
  };
  const url = pageMap[page] || (page + '.html');
  fetch(url)
    .then(response => response.text())
    .then(html => {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      const newContent = tempDiv.querySelector('#vqvlt-content');
      if (newContent) {
        const currentContent = document.querySelector('#vqvlt-content');
        currentContent.replaceWith(newContent);
        const newUrl = '/' + page;
        history.pushState({page: page}, '', newUrl);
        if (page === 'vault') {
          attachVaultLoginLogic();
        }
      }
    });
}
window.addEventListener('popstate', function(event) {
  if (event.state && event.state.page) {
    newPage(event.state.page);
  }
});
</script>
  <script>
document.addEventListener('DOMContentLoaded', function() {
  var slider = document.getElementById('fov-slider');
  var valueLabel = document.getElementById('fov-value');
  if (!slider || !valueLabel) return; // Exit if slider is not found
  // Set initial value from game params if available
  if (window.racr && racr.params && racr.params.fieldOfView) {
    slider.value = racr.params.fieldOfView;
  }
  valueLabel.textContent = slider.value;

  slider.addEventListener('input', function() {
    valueLabel.textContent = slider.value;
    if (window.racr && racr.params) {
      racr.params.fieldOfView = parseInt(slider.value, 10);
      // Recalculate cameraDepth and reset the game view
      racr.params.cameraDepth = 1 / Math.tan((racr.params.fieldOfView / 2) * Math.PI / 180);
      if (typeof racr.reset === 'function') {
        racr.reset();
      }
    }
  });
});
</script>
