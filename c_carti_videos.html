<script>
function newPage(page) {
  const pageMap = {
    home: 'home.html',
    contact: 'contact.html',
    about: 'about.html',
    tools: 'tools.html',
    vault: 'vault.html',
    media: 'media.html',
    lost: 'lost.html',
    chug: 'chug.html',
    c_video_list: 'c_video_list.html',
    c_pic_list: 'c_pic_list.html',
    c_carti_videos: 'c_carti_videos.html',
    terms: 'terms.html',
    // add more mappings as needed
  };
  const url = pageMap[page] || (page + '.html');
  fetch(url)
    .then(response => response.text())
    .then(html => {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = html;
      const newContent = tempDiv.querySelector('#vqvlt-content');
      if (newContent) {
        const currentContent = document.querySelector('#vqvlt-content');
        currentContent.replaceWith(newContent);
        const newUrl = '/' + page;
        history.pushState({page: page}, '', newUrl);
        if (page === 'vault') {
          attachVaultLoginLogic();
        }
      }
    });
}
window.addEventListener('popstate', function(event) {
  if (event.state && event.state.page) {
    newPage(event.state.page);
  }
});

</script>
